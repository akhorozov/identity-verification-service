servers:
  - url: https://bridgerstaging.lexisnexis.com/LN.WebServices
components:
  schemas:
    AddResultRecordRequest:
      type: object
      required:
        - ListId
        - Result
      properties:
        ClientContext:
          $ref: '#/components/schemas/ClientContext'
        Result:
          $ref: '#/components/schemas/ResultInfo'
        ListId:
          type: integer
          format: int64
      xml:
        name: AddResultRecordRequest
    ClientContext:
      type: object
      properties:
        ClientID:
          type: string
        ClientReference:
          type: string
        DPPA:
          type: string
          enum:
            - NA
            - Choice0
            - Choice1
            - Choice2
            - Choice3
            - Choice4
            - Choice6
        GLB:
          type: integer
          format: int32
        Password:
          type: string
        UserID:
          type: string
      xml:
        name: ClientContext
    ResultInfo:
      type: object
      properties:
        NewAlertState:
          type: string
          enum:
            - None
            - Closed
            - Open
            - Unassigned
        NewMatchStates:
          type: array
          xml:
            name: WatchlistMatchState
            wrapped: true
          items:
            $ref: '#/components/schemas/WatchlistMatchState'
        NewStatus:
          type: string
        Note:
          type: string
        Record:
          $ref: '#/components/schemas/ResultRecord'
        ResultID:
          type: integer
          format: int64
      xml:
        name: ResultInfo
    WatchlistMatchState:
      type: object
      properties:
        MatchID:
          type: integer
          format: int64
        Type:
          type: string
          enum:
            - None
            - FalsePositive
            - TrueMatch
      xml:
        name: WatchlistMatchState
    ResultRecord:
      type: object
      properties:
        AttachmentIDs:
          type: array
          items:
            type: integer
            format: int64
        FraudPoint:
          $ref: '#/components/schemas/FraudPointResults'
        InstantIDBusiness:
          $ref: '#/components/schemas/InstantIDBusinessResults'
        InstantIDIndividual:
          $ref: '#/components/schemas/InstantIDIndividualResults'
        InstantIDIntlIndividual:
          $ref: '#/components/schemas/InstantIDIntlIndividualResults'
        Record:
          type: integer
          format: int64
        RecordDetails:
          $ref: '#/components/schemas/ResultRecordDetails'
        ResultID:
          type: integer
          format: int64
        RunID:
          type: integer
          format: int64
        Watchlist:
          $ref: '#/components/schemas/WatchlistResults'
        HasScreeningListMatches:
          type: boolean
        RecordStatus:
          type: string
        EFTID:
          type: string
      xml:
        name: ResultRecord
    FraudPointResults:
      type: object
      properties:
        Errors:
          type: array
          xml:
            name: ResultError
            wrapped: true
          items:
            $ref: '#/components/schemas/ResultError'
        Input:
          $ref: '#/components/schemas/FPInput'
        RedFlags:
          type: array
          xml:
            name: FPRedFlag
            wrapped: true
          items:
            $ref: '#/components/schemas/FPRedFlag'
        RiskIndicators:
          type: array
          xml:
            name: FPRiskIndicator
            wrapped: true
          items:
            $ref: '#/components/schemas/FPRiskIndicator'
        Score:
          type: integer
          format: int32
        SyntheticIdentityIndex:
          type: integer
          format: int32
        StolenIdentityIndex:
          type: integer
          format: int32
        ManipulatedIdentityIndex:
          type: integer
          format: int32
        VulnerableVictimIndex:
          type: integer
          format: int32
        FriendlyFraudIndex:
          type: integer
          format: int32
        SuspiciousActivityIndex:
          type: integer
          format: int32
      xml:
        name: FraudPointResults
    InstantIDBusinessResults:
      type: object
      properties:
        BankruptcyFilingsCount:
          type: integer
          format: int32
        ComprehensiveVerificationIndex:
          type: integer
          format: int32
        CorrectedCompanyName:
          type: string
        Errors:
          type: array
          xml:
            name: ResultError
            wrapped: true
          items:
            $ref: '#/components/schemas/ResultError'
        FEINMatches:
          type: array
          xml:
            name: IIDFEINMatch
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDFEINMatch'
        Input:
          $ref: '#/components/schemas/IIDInput'
        MostRecentBankrupctyFiling:
          $ref: '#/components/schemas/IIDFiling'
        MostRecentJudgmentLienFiling:
          $ref: '#/components/schemas/IIDFiling'
        NameAddressFEINIndicator:
          type: integer
          format: int32
        NameAddressPhoneIndicator:
          type: integer
          format: int32
        NameAddressSSNIndicator:
          type: integer
          format: int32
        PhoneOfNameAddress:
          type: string
        PhoneType:
          type: string
        ReleasedJudgmentLienCount:
          type: integer
          format: int32
        ReversePhone:
          $ref: '#/components/schemas/IIDReversePhone'
        RiskIndicators:
          type: array
          xml:
            name: IIDRiskIndicator
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDRiskIndicator'
        UnreleasedJudgmentLienCount:
          type: integer
          format: int32
        VerificationIndicators:
          $ref: '#/components/schemas/IIDVerificationIndicators'
        VerifiedInput:
          $ref: '#/components/schemas/IIDInput'
        Watchlist:
          $ref: '#/components/schemas/IIDWatchlist'
      xml:
        name: InstantIDBusinessResults
    InstantIDIndividualResults:
      type: object
      properties:
        AddressCMRA:
          type: string
        AddressHistory:
          type: array
          xml:
            name: IIDAddressHistory
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDAddressHistory'
        AddressPOBox:
          type: string
        AlternateNames:
          type: array
          xml:
            name: IIDAlternateName
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDAlternateName'
        ComprehensiveVerificationIndex:
          type: integer
          format: int32
        DOBMatchLevel:
          type: integer
          format: int32
        Errors:
          type: array
          xml:
            name: ResultError
            wrapped: true
          items:
            $ref: '#/components/schemas/ResultError'
        Input:
          $ref: '#/components/schemas/IIDInput'
        LexID:
          type: string
        NameAddressPhone:
          $ref: '#/components/schemas/IIDRiskIndicator'
        NameAddressSSN:
          $ref: '#/components/schemas/IIDRiskIndicator'
        PhoneOfNameAddress:
          type: string
        PotentialFollowupActions:
          type: array
          xml:
            name: IIDRiskIndicator
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDRiskIndicator'
        RedFlags:
          type: array
          xml:
            name: IIDRedFlag
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDRedFlag'
        ReversePhone:
          $ref: '#/components/schemas/IIDReversePhone'
        RiskIndicators:
          type: array
          xml:
            name: IIDRiskIndicator
            wrapped: true
          items:
            $ref: '#/components/schemas/IIDRiskIndicator'
        SSNInfo:
          $ref: '#/components/schemas/IIDSSNInfo'
        VerifiedInput:
          $ref: '#/components/schemas/IIDInput'
        Version:
          type: string
        Watchlist:
          $ref: '#/components/schemas/IIDWatchlist'
      xml:
        name: InstantIDIndividualResults
    InstantIDIntlIndividualResults:
      type: object
      properties:
        Header:
          $ref: '#/components/schemas/IIDIHeader'
        Result:
          $ref: '#/components/schemas/IIDIResult'
      xml:
        name: InstantIDIntlIndividualResults
    ResultRecordDetails:
      type: object
      properties:
        AcceptListID:
          type: integer
          format: int64
        AccountAmount:
          type: string
        AccountDate:
          type: string
        AccountGroupID:
          type: string
        AccountOtherData:
          type: string
        AccountProviderID:
          type: string
        AccountMemberID:
          type: string
        AccountType:
          type: string
        AddedToAcceptList:
          type: boolean
        AdditionalInfo:
          type: array
          xml:
            name: InputAdditionalInfo
            wrapped: true
          items:
            $ref: '#/components/schemas/InputAdditionalInfo'
        Addresses:
          type: array
          xml:
            name: InputAddress
            wrapped: true
          items:
            $ref: '#/components/schemas/InputAddress'
        CustomWatchlistIDs:
          type: array
          items:
            type: integer
            format: int32
        Division:
          type: string
        DPPA:
          type: string
          enum:
            - NA
            - Choice0
            - Choice1
            - Choice2
            - Choice3
            - Choice4
            - Choice6
        EFTContext:
          type: string
        EFTType:
          type: string
          enum:
            - None
            - ACH
            - Fedwire
            - ISO20022
            - SWIFT
            - Unstructured
        EntityType:
          type: string
          enum:
            - None
            - Business
            - Individual
            - Text
            - Unknown
            - Unstructured
        Error:
          $ref: '#/components/schemas/ResultError'
        Gender:
          type: string
          enum:
            - None
            - Female
            - Male
            - Unknown
        GLB:
          type: integer
          format: int32
        IDs:
          type: array
          xml:
            name: InputID
            wrapped: true
          items:
            $ref: '#/components/schemas/InputID'
        LastUpdatedDate:
          type: string
          format: date-time
        Name:
          $ref: '#/components/schemas/InputName'
        ParsedACH:
          $ref: '#/components/schemas/ParsedACH'
        ParsedFedwire:
          $ref: '#/components/schemas/ParsedFedwire'
        ParsedISO20022:
          $ref: '#/components/schemas/ParsedISO20022'
        ParsedSWIFT:
          $ref: '#/components/schemas/ParsedSWIFT'
        Phones:
          type: array
          xml:
            name: InputPhone
            wrapped: true
          items:
            $ref: '#/components/schemas/InputPhone'
        RecordState:
          $ref: '#/components/schemas/RecordState'
        SearchDate:
          type: string
          format: date-time
        Text:
          type: string
      xml:
        name: ResultRecordDetails
    WatchlistResults:
      type: object
      properties:
        Matches:
          type: array
          xml:
            name: WLMatch
            wrapped: true
          items:
            $ref: '#/components/schemas/WLMatch'
        Status:
          type: string
          enum:
            - NotSearched
            - NoResults
            - Results
      xml:
        name: WatchlistResults
    ResultError:
      type: object
      properties:
        Code:
          type: integer
          format: int32
        Message:
          type: string
      xml:
        name: ResultError
    FPInput:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/FPAddress'
        DOB:
          type: string
        Name:
          $ref: '#/components/schemas/InputName'
        Phone:
          type: string
        SSN:
          type: string
      xml:
        name: FPInput
    FPRedFlag:
      type: object
      properties:
