          type: string
        RiskIndicators:
          type: array
          xml:
            name: FPRiskIndicator
            wrapped: true
          items:
            $ref: '#/components/schemas/FPRiskIndicator'
      xml:
        name: FPRedFlag
    FPRiskIndicator:
      type: object
      properties:
        Description:
          type: string
        RiskCode:
          type: string
      xml:
        name: FPRiskIndicator
    IIDFEINMatch:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/IIDAddress'
        CompanyName:
          type: string
      xml:
        name: IIDFEINMatch
    IIDInput:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/IIDAddress'
        DOB:
          type: string
        DOBVerified:
          type: string
        FEIN:
          type: string
        Name:
          $ref: '#/components/schemas/InputName'
        Phone:
          type: string
        SSN:
          type: string
      xml:
        name: IIDInput
    IIDFiling:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/IIDAddress'
        Date:
          type: string
        Name:
          type: string
        Type:
          type: string
      xml:
        name: IIDFiling
    IIDReversePhone:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/IIDAddress'
        Name:
          $ref: '#/components/schemas/InputName'
      xml:
        name: IIDReversePhone
    IIDRiskIndicator:
      type: object
      properties:
        Description:
          type: string
        RiskCode:
          type: string
      xml:
        name: IIDRiskIndicator
    IIDVerificationIndicators:
      type: object
      properties:
        Address:
          type: string
        City:
          type: string
        FEIN:
          type: string
        Name:
          type: string
        Phone:
          type: string
        PostalCode:
          type: string
        State:
          type: string
      xml:
        name: IIDVerificationIndicators
    IIDWatchlist:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/IIDAddress'
        County:
          type: string
        EntityName:
          type: string
        FirstName:
          type: string
        LastName:
          type: string
        RecordNumber:
          type: string
        Table:
          type: string
      xml:
        name: IIDWatchlist
