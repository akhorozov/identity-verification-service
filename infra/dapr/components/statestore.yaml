apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: address-validation-statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      secretKeyRef:
        name: redis-connection
        key:  host
    - name: redisPassword
      secretKeyRef:
        name: redis-connection
        key:  password
    - name: actorStateStore
      value: "false"
    - name: ttlInSeconds
      value: "3600"
    - name: keyPrefix
      value: "addr:v1"
auth:
  secretStore: azure-keyvault
