      responses:
        '200':
          description: OK
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Bad Request
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '500':
          description: Internal Server Error
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - default: []
      x-throttling-tier: Unlimited
      x-auth-type: Application & Application User
      path: /business-verification
      method: POST
  /health:
    get:
      tags:
        - Health Check
      summary: Get updated response of application and database health
      description: >-
        Receives response on the status of the database and if the application
        itself is running
      operationId: healthCheck
      parameters:
        - $ref: '#/components/parameters/uuid'
      responses:
        '200':
          description: OK
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
        '400':
          description: Bad Request
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
        '500':
          description: Server Error
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
      security:
        - default: []
      x-throttling-tier: Unlimited
      x-auth-type: Application & Application User
      path: /health
      method: GET
components:
  schemas:
    UpdateCommentStatusRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/Status'
    SubscriptionRequest:
      required:
        - consumerDetails
        - customer
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/RequestCustomer'
        consumerDevice:
          $ref: '#/components/schemas/ConsumerDevice'
        actionQuestions:
          $ref: '#/components/schemas/ActionQuestions'
        consumerDetails:
          $ref: '#/components/schemas/ConsumerDetails'
        businessDetails:
          $ref: '#/components/schemas/BusinessDetails'
        consumerMultiFactorAuthentication:
          $ref: '#/components/schemas/ConsumerMultiFactorAuthentication'
        feedback:
          $ref: '#/components/schemas/RequestFeedback'
    SubscriptionResponse:
      type: object
      properties:
        finalResult:
          maxLength: 20
          minLength: 0
          type: string
          description: final result of callout
          example: Pass
        transactionId:
          maxLength: 36
          minLength: 0
          type: string
          description: transaction ID
          example: '8798456465651651654'
        requestedVia:
          maxLength: 36
          minLength: 0
          type: string
          description: Requested via?
          example: GKYC API v.1.0
        ruleIdExecuted:
          maxLength: 36
          minLength: 0
          type: string
          description: rule ID executed
          example: '5'
        ruleNameExecuted:
          maxLength: 36
          minLength: 0
          type: string
          description: rule name executed
          example: Rule 1
        ruleRevisionExecuted:
          maxLength: 36
          minLength: 0
          type: string
          description: rule revision executed
          example: '1'
        htmlSummary:
          maxLength: 2147483647
          minLength: 0
          type: string
          description: html summary of results
          example: html string...
        inputResponse:
          $ref: '#/components/schemas/InputResponseObject'
        subRuleResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: list of sub rule transaction ids executed
          items:
            $ref: '#/components/schemas/SubRuleResponseObject'
        watchListResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: watchList Response array
          items:
            $ref: '#/components/schemas/WatchListResponseArrayObject'
        documentVerificationResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: documentVerification Response array
          items:
            $ref: '#/components/schemas/DocumentVerificationResponseArrayObject'
        identityVerificationResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: identityVerification Response array
          items:
            $ref: '#/components/schemas/IdentityVerificationResponseArrayObject'
        fraudChexScreeningResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: fraudChex Response array
          items:
            $ref: '#/components/schemas/FraudChexResponseArrayObject'
        deviceProfilingResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: deviceProfiling Response array
          items:
            $ref: '#/components/schemas/DeviceProfilingResponseArrayObject'
        riskScreeningResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: riskScreening Response array
          items:
            $ref: '#/components/schemas/RiskScreeningResponseArrayObject'
        notificationResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: notifications Response array
          items:
            $ref: '#/components/schemas/NotificationsResponseArrayObject'
        multiFactorAuthenticationResponse:
          maxItems: 100
          minItems: 0
          type: array
          description: multiFactorAuthenticationResponse Response array
          items:
            $ref: '#/components/schemas/MultiFactorAuthenticationResponse'
        comments:
          maxItems: 100
          minItems: 0
          type: array
          description: an array of comments
          items:
            $ref: '#/components/schemas/Comments'
        actionResults:
          maxItems: 100
          minItems: 0
          type: array
          description: >-
            an array of action results related to action questions sent in the
            GKYC request
          items:
            $ref: '#/components/schemas/ActionResults'
        details:
          $ref: '#/components/schemas/ErrorDetails'
      description: Subscription response
    InputResponseObject:
      type: object
      properties:
        result:
          maxLength: 10
          minLength: 0
          type: string
          description: result of watch list callout
          example: fail
        order:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: order this step was run
          example: 1
        stepSequence:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: order this step was run
          example: 1
        deliveryStatus:
          maximum: 10
          minimum: 0
          type: string
          description: Delivery Status
          example: Sent
        timedOut:
          maximum: 20
          minimum: 0
          type: string
          description: Has transaction Timed out
          example: 'False'
        link:
          maximum: 50
          minimum: 0
          type: string
          description: Link to consumer form
          example: >-
            https://gkyc-test.mendixcloud.com/link/consumer?LinkID=J0RGaBoTzkycl37o
      description: InputResponse object
    SubRuleResponseObject:
      type: object
      properties:
        subRuleTransactionId:
          maxLength: 200
          minLength: 0
          type: string
          description: sub rule transaction id
          example: fd160633-f697-40a4-a0dc-9efa187ob52
      description: Sub rule response object
    WatchListResponseArrayObject:
      type: object
      properties:
