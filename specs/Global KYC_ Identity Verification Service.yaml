openapi: 3.0.1
info:
  title: 'Global KYC: Identity Verification Service'
  description: >-
    A real-time “As a Service” API enabling banking institutions or businesses
    to verify consumers identity during account opening. The service simplifies
    due diligence processes for CIP and KYC workflows; streamlines compliance
    with rules orchestration across IDV, Document ID, Fraud and Watchlist
    Screening. Global KYC also provides a single pane transaction manager with
    reporting and a dashboard.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.30
servers:
  - url: https://api-gw2-uat.fisglobal.com/rest/consumers-verification/v1
  - url: http://api-gw2-prod1.fisglobal.com/rest/consumers-verification/v1
security:
  - default: []
paths:
  /consumers-verification:
    get:
      tags:
        - Consumers Verification
      summary: Get updated response of consumer verification callout
      description: >-
        Receives updated overall response of original callout based on
        transactionId
      operationId: consumerVerificationStatus
      parameters:
        - $ref: '#/components/parameters/uuid'
        - $ref: '#/components/parameters/transactionid'
      responses:
        '200':
          description: OK
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Bad Request
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '500':
          description: Server Error
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - default: []
      x-throttling-tier: Unlimited
      x-auth-type: Application & Application User
      path: /consumers-verification
      method: GET
    post:
      tags:
        - Consumers Verification
      summary: Consumer verification callout
      description: >-
        A real-time “As a Service” API enabling banking institutions or
        businesses to verify consumers identity during account opening. The
        service simplifies due diligence processes for CIP and KYC workflows;
        streamlines compliance with rules orchestration across IDV, Document ID,
        Fraud and Watchlist Screening. Global KYC also provides a single pane
        transaction manager with reporting and a dashboard.
      operationId: consumerVerification
      parameters:
        - $ref: '#/components/parameters/uuid'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '200':
          description: OK
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Bad Request
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '500':
          description: Internal Server Error
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - default: []
      x-throttling-tier: Unlimited
      x-auth-type: Application & Application User
      path: /consumers-verification
      method: POST
  /consumers-verification/commentstatus-update:
    post:
      tags:
        - Consumers Verification
      summary: update status and coment endpoint
      description: >-
        Allows user to update the status of a specific transaction and/or add a
        comment to a specific transaction.
      operationId: commentStatusUpdate
      parameters:
        - $ref: '#/components/parameters/uuid'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentStatusRequest'
      responses:
        '200':
          description: OK
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
