          maxLength: 255
          minLength: 0
          type: string
          description: error message
          example: Sample Error Message
        code:
          maxLength: 20
          minLength: 0
          type: string
          description: error code
          example: 400/500
      description: update comment/status error object
  parameters:
    uuid:
      name: uuid
      in: header
      description: Uniquely identifies an API call. Generated on each call.
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 36
        minLength: 32
        pattern: >-
          ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$
        type: string
        example: 124a4567-e79b-12d3-b456-346655440000
      example: 8bbaf6de-707c-46f6-b2b6-8e3ffe1d909c
    source:
      name: source
      in: header
      description: Source passed on each migration call.
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 36
        minLength: 0
        pattern: ^[0-9A-Za-z]{0,36}$
        type: string
        example: Source
      example: Source
    token:
      name: token
      in: header
      description: token for validation on each migration call
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 36
        minLength: 0
        pattern: ^[0-9A-Za-z]{0,36}$
        type: string
        example: 8bbaf6de
      example: 8bbaf6de
    transactionid:
