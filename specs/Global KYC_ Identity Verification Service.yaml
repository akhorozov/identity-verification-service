        '400':
          description: Bad Request
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '500':
          description: Server Error
          headers:
            uuid:
              $ref: '#/components/headers/uuid'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - default: []
      x-throttling-tier: Unlimited
      x-auth-type: Application & Application User
      path: /business-verification
      method: GET
    post:
      tags:
        - Business Verification
      summary: Business verification callout
      description: >-
        A real-time “As a Service” API enabling banking institutions or
        businesses to verify consumers identity during account opening. The
        service simplifies due diligence processes for CIP and KYC workflows;
        streamlines compliance with rules orchestration across IDV, Document ID,
        Fraud and Watchlist Screening. Global KYC also provides a single pane
        transaction manager with reporting and a dashboard.
      operationId: businessVerification
      parameters:
        - $ref: '#/components/parameters/uuid'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
