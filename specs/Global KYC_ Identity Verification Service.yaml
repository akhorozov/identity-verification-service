      required: true
      style: form
      explode: true
      schema:
        maxLength: 36
        minLength: 0
        type: string
      example: '123456789'
    externalid:
      name: externalid
      in: header
      description: external id being passed for authentication
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 36
        minLength: 0
        type: string
      example: '12345678'
  headers:
    uuid:
      description: A unique transaction identifier to be used per API interaction
      required: true
      style: simple
      explode: false
      schema:
        maxLength: 36
        minLength: 32
        pattern: >-
          ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$
        type: string
