          type: string
          description: when the url expires
          format: date
        hasConsistentData:
          maxLength: 5
          minLength: 0
          type: string
          description: is data consistent?
          example: 'YES'
        configuration:
          $ref: '#/components/schemas/Configuration'
        customer:
          $ref: '#/components/schemas/Customer'
        started:
          type: boolean
          description: request started?
          example: true
        completed:
          type: boolean
          description: request completed?
          example: false
        passed:
          type: boolean
          description: request passed?
          example: false
        processed:
          type: boolean
          description: request processed?
          example: true
        skippedAt:
          type: string
          description: skipped at timestamp
          example: '2021-06-04T15:14:19.0039180Z'
        currentStep:
          maxLength: 20
          minLength: 0
          type: string
          description: Current step running
          example: BASIC_INFO
        steps:
          maxItems: 100
          minItems: 0
