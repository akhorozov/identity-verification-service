          maxLength: 20
          minLength: 0
          type: string
          description: request Id
          example: '12345'
    ResponseData:
      type: object
      properties:
        fakeDetected:
          type: boolean
          description: if provided video is a fake.
          example: true
        proofOfLiveness:
          type: boolean
          description: raw result from service determining PoL.
          example: false
        shapeError:
          maximum: 100
          minimum: 0
          type: number
          description: >-
            the measure of how far the processed face is to our ideal face
            model. The closer to zero the better.
          format: float
          example: 2.34
        duration:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: video processing time.
          example: 6
        faceImageUrl:
          maxLength: 2147483647
          minLength: 0
          type: string
          description: temporarily stored video frame with face
          example: https://pathToPol.com/polvideo.mp4
        mrzRaw:
          maxLength: 2147483647
          minLength: 0
          type: string
          description: raw data read from the barcode strip in MRZ format
          example: P<USATRAVELER<<HA...
        mrzVerification:
          type: boolean
          description: is MRZ valid, format-wise
          example: false
        confidence:
          maximum: 1
          minimum: 0
          type: number
          description: confidence level of proof of liveness from 0.0-1.0
          format: float
          example: 0.9
        verdict:
          type: boolean
          description: raw result from service determining PoL
          example: true
        userEnteredData:
          $ref: '#/components/schemas/UserEnteredData'
        documentDetails:
          $ref: '#/components/schemas/DocumentDetails'
        Data:
          $ref: '#/components/schemas/Data'
        subtasks:
          $ref: '#/components/schemas/Subtasks'
