          description: customerId of client
          example: '100000'
        result:
          maxLength: 10
          minLength: 0
          type: string
          description: result of watch list callout
          example: fail
        order:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: order this step was run
          example: 1
        stepSequence:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: order this step was run
          example: 1
        watchListReporter:
          $ref: '#/components/schemas/watchListReporter'
        watchListResults:
          maxItems: 100
          minItems: 0
          type: array
          description: watchList Results array
          items:
            $ref: '#/components/schemas/WatchListArrayObject'
        details:
          $ref: '#/components/schemas/ErrorDetails'
      description: watchListResponse object
    DocumentVerificationResponseArrayObject:
      type: object
