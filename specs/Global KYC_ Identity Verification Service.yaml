      required:
        - details
      type: object
      properties:
        details:
          type: array
          description: >-
            (Required) The details attribute identifies an array of one or more
            objects providing information about the specific instances of the
            type of error that occurred.
          items:
            required:
              - code
              - message
            type: object
            properties:
              code:
                maxLength: 4
                minLength: 0
                type: string
                description: Error code that describes the error
                example: 400/500
              message:
                maxLength: 99
                minLength: 0
                type: string
                description: Error message that describes the error
                example: Sample Error Message
